# Sidecar OpenClaw RL test stack.
#
# This file is intentionally separate from docker-compose.yml so a server can
# test the integration branch without replacing the running openclaw stack.

name: openclaw-rl-test

services:
  postgres:
    container_name: openclaw-rl-test-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nanobot
      POSTGRES_PASSWORD: nanobot
      POSTGRES_DB: nanobot_platform
    ports:
      - "25432:5432"
    volumes:
      - pgdata_rl_test:/var/lib/postgresql/data
    networks:
      - openclaw-rl-test-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanobot -d nanobot_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    container_name: openclaw-rl-test-gateway
    build: ./platform
    ports:
      - "18081:8080"
    environment:
      PLATFORM_DATABASE_URL: postgresql+asyncpg://nanobot:nanobot@postgres:5432/nanobot_platform
      PLATFORM_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      PLATFORM_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      PLATFORM_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      PLATFORM_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PLATFORM_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLATFORM_OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      PLATFORM_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PLATFORM_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PLATFORM_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      PLATFORM_MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      PLATFORM_MINIMAX_API_BASE: ${MINIMAX_API_BASE:-}
      PLATFORM_AIHUBMIX_API_KEY: ${AIHUBMIX_API_KEY:-}
      PLATFORM_MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      PLATFORM_KIMI_API_KEY: ${KIMI_API_KEY:-}
      PLATFORM_ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      PLATFORM_DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}

      PLATFORM_HOSTED_VLLM_API_KEY: ${HOSTED_VLLM_API_KEY:-}
      PLATFORM_HOSTED_VLLM_API_BASE: ${HOSTED_VLLM_API_BASE:-}

      PLATFORM_DEFAULT_MODEL: ${DEFAULT_MODEL:-dashscope/qwen3-coder-plus}
      PLATFORM_OPENCLAW_IMAGE: ${PLATFORM_OPENCLAW_IMAGE:-openclaw:latest}
      PLATFORM_HERMES_IMAGE: ${PLATFORM_HERMES_IMAGE:-nanobot-hermes-agent:rl-test}
      PLATFORM_DEDICATED_RUNTIME_BACKEND: ${PLATFORM_DEDICATED_RUNTIME_BACKEND:-hermes}
      PLATFORM_DEV_OPENCLAW_URL: ${PLATFORM_DEV_OPENCLAW_URL:-http://openclaw-rl-test-shared:8080}
      PLATFORM_HERMES_CONNECT_RETRIES: ${PLATFORM_HERMES_CONNECT_RETRIES:-60}
      PLATFORM_HERMES_RETRY_DELAY_SECONDS: ${PLATFORM_HERMES_RETRY_DELAY_SECONDS:-0.5}
      PLATFORM_HERMES_API_TOOLSETS: ${PLATFORM_HERMES_API_TOOLSETS:-terminal,file,skills}
      PLATFORM_HERMES_REASONING_EFFORT: ${PLATFORM_HERMES_REASONING_EFFORT:-none}
      PLATFORM_HERMES_SERVICE_TIER: ${PLATFORM_HERMES_SERVICE_TIER:-}
      PLATFORM_MINIMAX_M27_USE_HIGHSPEED: ${MINIMAX_M27_USE_HIGHSPEED:-true}
      PLATFORM_DEDICATED_HERMES_URL: ${PLATFORM_DEDICATED_HERMES_URL:-}
      PLATFORM_DEDICATED_RUNTIME_CONTAINER_NAME_PREFIX: ${PLATFORM_DEDICATED_RUNTIME_CONTAINER_NAME_PREFIX:-hermes-rl-test-user}
      PLATFORM_DEDICATED_RUNTIME_DATA_VOLUME_PREFIX: ${PLATFORM_DEDICATED_RUNTIME_DATA_VOLUME_PREFIX:-hermes-rl-test-data}
      PLATFORM_CONTAINER_NETWORK: openclaw-rl-test-internal
      PLATFORM_USER_CONTAINER_PUBLISH_PORTS: ${PLATFORM_USER_CONTAINER_PUBLISH_PORTS:-false}
      PLATFORM_PUBLIC_BASE_URL: ${PLATFORM_PUBLIC_BASE_URL:-http://127.0.0.1:18081}
      PLATFORM_SHARED_OPENCLAW_ENABLED: ${PLATFORM_SHARED_OPENCLAW_ENABLED:-true}
      PLATFORM_SHARED_RUNTIME_BACKEND: ${PLATFORM_SHARED_RUNTIME_BACKEND:-hermes}
      PLATFORM_SHARED_OPENCLAW_URL: ${PLATFORM_SHARED_OPENCLAW_URL:-http://shared-openclaw:8080}
      PLATFORM_SHARED_HERMES_URL: ${PLATFORM_SHARED_HERMES_URL:-http://shared-openclaw:8080}
      PLATFORM_SHARED_HERMES_API_KEY: ${PLATFORM_SHARED_HERMES_API_KEY:-dev-hermes-bridge-key}
      PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN: ${PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN:-shared-openclaw-system-token}
      PLATFORM_CONTAINER_TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      PLATFORM_CONTAINER_MEMORY_LIMIT: ${PLATFORM_CONTAINER_MEMORY_LIMIT:-2g}
      PLATFORM_CONTAINER_SHM_SIZE: ${PLATFORM_CONTAINER_SHM_SIZE:-1g}
      PLATFORM_TRAINING_TRACE_ENABLED: ${PLATFORM_TRAINING_TRACE_ENABLED:-true}
      PLATFORM_TRAINING_TRACE_INGEST_ENABLED: ${PLATFORM_TRAINING_TRACE_INGEST_ENABLED:-true}
      PLATFORM_TRAINING_TRACE_INGEST_TOKEN: ${PLATFORM_TRAINING_TRACE_INGEST_TOKEN:-rl-test-ingest-token}
      PLATFORM_TRAINING_TRACE_DIR: ${PLATFORM_TRAINING_TRACE_DIR:-/app/.hermes/training_traces}
      PLATFORM_TRAINING_TRACE_HASH_SALT: ${PLATFORM_TRAINING_TRACE_HASH_SALT:-rl-test-salt}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.hermes/benchmarks:/app/.hermes/benchmarks:ro
      - ./.hermes/training_traces_rl_test:/app/.hermes/training_traces
    networks:
      - openclaw-rl-test-internal
      - openclaw-rl-test-external
    depends_on:
      postgres:
        condition: service_healthy

  shared-openclaw:
    container_name: openclaw-rl-test-shared
    image: ${PLATFORM_HERMES_IMAGE:-nanobot-hermes-agent:rl-test}
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile.bridge
    command: ["gateway", "run"]
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8080
      API_SERVER_KEY: ${PLATFORM_SHARED_HERMES_API_KEY:-dev-hermes-bridge-key}
      HERMES_API_TOOLSETS: ${PLATFORM_HERMES_API_TOOLSETS:-terminal,file,skills}
      HERMES_REASONING_EFFORT: ${PLATFORM_HERMES_REASONING_EFFORT:-none}
      HERMES_SERVICE_TIER: ${PLATFORM_HERMES_SERVICE_TIER:-}
      API_SERVER_MODEL_NAME: ${DEFAULT_MODEL:-dashscope/qwen3-coder-plus}
      NANOBOT_PROXY__URL: http://gateway:8080/llm/v1
      NANOBOT_PROXY__TOKEN: ${PLATFORM_SHARED_OPENCLAW_SYSTEM_TOKEN:-shared-openclaw-system-token}
      NANOBOT_AGENTS__DEFAULTS__MODEL: ${DEFAULT_MODEL:-dashscope/qwen3-coder-plus}
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
    volumes:
      - shared_openclaw_data_rl_test:/opt/data
    networks:
      - openclaw-rl-test-internal
    depends_on:
      - gateway

networks:
  openclaw-rl-test-internal:
    name: openclaw-rl-test-internal
    driver: bridge
    internal: false
  openclaw-rl-test-external:
    name: openclaw-rl-test-external
    driver: bridge

volumes:
  pgdata_rl_test:
  shared_openclaw_data_rl_test:
